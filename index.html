<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/js-sdk.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>build-your-first-app-26</title>
  </head>
  <body>
    <calcite-shell content-behind="true">
      <calcite-navigation id="header" slot="header">
        <calcite-navigation-logo slot="logo" heading="My First App">
        </calcite-navigation-logo>
        <calcite-label
          id="view-switch-label"
          layout="inline"
          slot="content-end"
        >
          2D
          <calcite-switch id="view-switch"></calcite-switch>
          3D
        </calcite-label>
      </calcite-navigation>
      <arcgis-map id="map-view" item-id="46f660e84f5743538284e493bc7fa0e9">
        <arcgis-zoom slot="top-left"> </arcgis-zoom>
      </arcgis-map>
      <arcgis-scene
        id="scene-view"
        item-id="119769168e2448b5bebffede8037565d"
        hidden
      >
        <arcgis-zoom slot="top-left"> </arcgis-zoom>
        <arcgis-navigation-toggle slot="top-left"> </arcgis-navigation-toggle>
        <arcgis-compass slot="top-left"> </arcgis-compass>
      </arcgis-scene>
      <calcite-shell-panel display-mode="float-content" slot="panel-end">
        <arcgis-layer-list
          id="layer-list"
          selection-mode="single"
          reference-element="#map-view"
          show-collapse-button
          show-heading
        ></arcgis-layer-list>
      </calcite-shell-panel>
      <div slot="footer">
        <arcgis-feature-table
          id="feature-table"
          reference-element="#map-view"
          table-title="Select a layer in the layer list"
        ></arcgis-feature-table>
      </div>
    </calcite-shell>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
